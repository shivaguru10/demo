    <script>
        async function loadSections() {
            const sections = ['home', 'aboutus', 'products-services', 'payment', 'photogallery', 'videogallery', 'feedback', 'location', 'enquiry'];
            for (let sec of sections) {
                try {
                    const res = await fetch(`sections/${sec}.html?v=` + new Date().getTime());
                    if (res.ok) {
                        const text = await res.text();
                        document.getElementById('section-' + sec).innerHTML = text;
                    } else {
                        console.error('Failed to load', sec);
                    }
                } catch (e) { console.error(e); }
            }

            initViewCounter();

            const savedFb = JSON.parse(localStorage.getItem("creativepluz_vbc_feedbacks") || "[]");
            const fbList = document.querySelector('.feedback-list');
            if (fbList && savedFb.length > 0) {
                savedFb.forEach(fb => fbList.insertAdjacentHTML('afterbegin', fb));
            }

            if (typeof updateFeedbackVisibility === 'function') {
                updateFeedbackVisibility();
            }
        }

        function initViewCounter() {
            const baseViews = 100;
            let viewCount = localStorage.getItem('creativepluz_vbc_views');

            if (!viewCount) {
                viewCount = baseViews + 1;
                localStorage.setItem('creativepluz_vbc_views', viewCount);
            } else {
                viewCount = parseInt(viewCount);
                if (!sessionStorage.getItem('creativepluz_vbc_session')) {
                    viewCount += 1;
                    localStorage.setItem('creativepluz_vbc_views', viewCount);
                }
            }

            sessionStorage.setItem('creativepluz_vbc_session', 'active');

            const displayEl = document.getElementById('viewCountDisplay');
            if (displayEl) displayEl.innerText = viewCount;
        }

        window.updateFeedbackVisibility = function (showAll = false) {
            const list = document.querySelector('.feedback-list');
            if (!list) return;

            const feedbacks = list.querySelectorAll('.feedback-wrapper');
            let btn = document.getElementById('feedbackToggleBtn');

            if (feedbacks.length <= 3) {
                if (btn) btn.style.display = 'none';
                feedbacks.forEach(f => f.style.display = 'block');
                return;
            }

            feedbacks.forEach((f, idx) => {
                f.style.display = (idx < 3 || showAll) ? 'block' : 'none';
            });

            if (!btn) {
                btn = document.createElement('button');
                btn.id = 'feedbackToggleBtn';
                btn.style.cssText = "background: white; color: #e91e63; padding: 10px; border: 2px solid #e91e63; font-weight: bold; cursor: pointer; display: block; width: 100%; text-align: center; margin-bottom: 20px; border-radius: 4px; font-size: 15px;";
                list.parentNode.insertBefore(btn, list.nextSibling);

                btn.onmouseover = function () { this.style.background = '#e91e63'; this.style.color = 'white'; };
                btn.onmouseout = function () { this.style.background = 'white'; this.style.color = '#e91e63'; };
            }

            btn.style.display = 'block';
            btn.innerText = showAll ? "Show Less" : `Show More (${feedbacks.length - 3})`;
            btn.onclick = function () {
                updateFeedbackVisibility(!showAll);
            };
        };

        loadSections();
    </script>

    <script>
        window.openImageModal = function (imgElement) {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("img01");
            const captionText = document.getElementById("caption");

            modal.style.display = "block";
            modalImg.src = imgElement.src;
            captionText.innerHTML = imgElement.alt || "";
        }

        // Global listener for ANY image clicked that isn't handled already, and Star Ratings
        document.addEventListener('click', function (e) {
            if (e.target.tagName === 'IMG' &&
                !e.target.closest('#imageModal') &&
                !e.target.hasAttribute('onclick')) {
                openImageModal(e.target);
            }

            // Handle dynamically loaded Star Ratings interactions
            if (e.target.tagName === 'SPAN' && e.target.hasAttribute('data-value')) {
                const starRatingSpan = e.target.parentElement;
                if (starRatingSpan && starRatingSpan.className.includes('gl-star-rating-stars')) {
                    const value = e.target.getAttribute('data-value');
                    starRatingSpan.className = 'gl-star-rating-stars s' + (value * 10);

                    const selectEl = starRatingSpan.previousElementSibling;
                    if (selectEl && selectEl.tagName === 'SELECT') {
                        selectEl.value = value;
                    }

                    const textEl = starRatingSpan.nextElementSibling;
                    if (textEl && textEl.className.includes('gl-star-rating-text')) {
                        textEl.innerText = e.target.getAttribute('data-text');
                    }
                }
            }
        });

        window.openShareModal = function () {
            const shareUrl = "https://demo-iota-gold.vercel.app/";
            const shareText = "Check out my Link ";

            if (navigator.share) {
                navigator.share({
                    title: 'Virtual Business Card',
                    text: shareText,
                    url: shareUrl
                }).catch(console.error);
            } else {
                const modal = document.getElementById("shareModal");
                const shareList = document.querySelector('#shareModal .share-btn');

                if (shareList && !shareList.dataset.initialized) {
                    shareList.innerHTML = `
                    <li><a href="https://wa.me/?text=${encodeURIComponent(shareText + shareUrl)}" target="_blank"><i class="share-btn-whatsapp fa fa-whatsapp"></i></a></li>
                    <li><a href="sms:?body=${encodeURIComponent(shareText + shareUrl)}"><i class="share-btn-sms fa fa-comments"></i></a></li>
                    <li><a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}" target="_blank"><i class="share-btn-facebook fa fa-facebook-f"></i></a></li>
                    <li><a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent('Check out my card')}" target="_blank"><i class="share-btn-twitter fa fa-twitter"></i></a></li>
                    <li><a href="https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(shareUrl)}" target="_blank"><i class="share-btn-linkedin fa fa-linkedin"></i></a></li>
                    <li><a href="mailto:?subject=Virtual%20Business%20Card&body=${encodeURIComponent(shareText + shareUrl)}"><i class="share-btn-mail fa fa-envelope"></i></a></li>
                `;
                    shareList.dataset.initialized = 'true';
                }
                modal.style.display = "block";
            }
        }

        window.openEnquiryModal = function (productName, imgSrc, description) {
            const modal = document.getElementById("enquiryModal");
            const msgField = document.getElementById("enquiryProductMessage");
            const displaySection = document.getElementById("enqServiceDisplay");
            const titleEl = document.getElementById("enqServiceTitle");
            const imgEl = document.getElementById("enqServiceImage");
            const descEl = document.getElementById("enqServiceDetails");

            modal.style.display = "flex";

            if (productName && imgSrc && description) {
                displaySection.style.display = "block";
                titleEl.innerText = productName;
                imgEl.src = imgSrc;
                descEl.innerText = description;
            } else {
                displaySection.style.display = "none";
            }

            if (productName) {
                msgField.value = "Hi, I am interested in your service: " + productName + ". Please provide more details.";
            } else {
                msgField.value = "";
            }
        }

        window.sendWhatsAppEnquiry = function (button) {
            const form = button.form;
            const name = form.querySelector('[name="enquiryName"]').value;
            const phone = form.querySelector('[name="phoneNumber"]').value;
            const email = form.querySelector('[name="email"]').value;
            const city = form.querySelector('[name="city"]').value;
            const quantity = form.querySelector('[name="quantity"]').value;
            const message = form.querySelector('[name="message"]').value;

            const waNumber = "918667573511";
            const text = `Hello *Creativepluz*,\n\nI am reaching out via your *Creativepluz Business Card* website with a new enquiry.\n\n*Name:* ${name}\n*Phone:* ${phone}\n*Email:* ${email}\n*City:* ${city}\n*Quantity:* ${quantity}\n*Message:* ${message}`;

            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(text)}`, '_blank');

            const modal = document.getElementById("enquiryModal");
            if (modal) modal.style.display = "none";
            form.reset();
        }

        window.sendFeedback = function (btn, user) {
            if (window.event) window.event.preventDefault();

            const form = btn.form;
            const name = form.querySelector('[name="feedbackName"]').value.trim();
            const feedbackText = form.querySelector('[name="feedback"]').value.trim();
            const ratingSelect = form.querySelector('[name="rating"]');

            if (!name || !feedbackText || ratingSelect.value === "") {
                alert("Please provide your Name, a Rating, and your Feedback before submitting!");
                return false;
            }

            const rating = parseInt(ratingSelect.value);
            const ratingClass = "s" + (rating * 10);
            const dateStr = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

            const newFeedbackHtml = `
            <div class="feedback-wrapper" style="animation: fadeIn 0.4s ease-out;"> 
                <span class="feedback-name-wrapper"><span class="feedback-name">${name}</span> on ${dateStr} </span>
                <div>
                   <span class="gl-star-rating-stars ${ratingClass}">
                       <span data-value="1" data-text="Terrible"></span>
                       <span data-value="2" data-text="Poor"></span>
                       <span data-value="3" data-text="Average"></span>
                       <span data-value="4" data-text="Very Good"></span>
                       <span data-value="5" data-text="Excellent"></span>
                   </span>
                </div>
                <div>${feedbackText}</div>
                <hr>
            </div>`;

            const list = document.querySelector('.feedback-list');
            if (list) list.insertAdjacentHTML('afterbegin', newFeedbackHtml);

            if (typeof updateFeedbackVisibility === 'function') {
                updateFeedbackVisibility(false);
            }

            const savedFb = JSON.parse(localStorage.getItem("creativepluz_vbc_feedbacks") || "[]");
            savedFb.push(newFeedbackHtml);
            localStorage.setItem("creativepluz_vbc_feedbacks", JSON.stringify(savedFb));

            form.reset();
            const starsSpan = form.querySelector('.gl-star-rating-stars');
            if (starsSpan) starsSpan.className = "gl-star-rating-stars s0";

            return false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById("imageModal");
            const span = document.getElementById("imageModalClose");

            if (span) {
                span.onclick = function () {
                    modal.style.display = "none";
                }
            }

            modal.onclick = function (e) {
                if (e.target !== document.getElementById("img01")) {
                    modal.style.display = "none";
                }
            }

            const shareModal = document.getElementById("shareModal");
            const shareModalClose = document.getElementById("shareModalClose");
            if (shareModalClose) {
                shareModalClose.onclick = function () {
                    shareModal.style.display = "none";
                }
            }

            const enqModal = document.getElementById("enquiryModal");
            const enqSpan = document.getElementById("enquiryModalClose");
            if (enqSpan) {
                enqSpan.onclick = function () {
                    enqModal.style.display = "none";
                }
            }
            enqModal.onclick = function (e) {
                if (e.target === enqModal) {
                    enqModal.style.display = "none";
                }
            }
        });
    </script>
