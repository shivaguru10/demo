            }
        }

<style>
    /* Ensure modal works smoothly on both mobile and desktop */
    #imageModal {
        display: none; /* Hidden by default */
        position: fixed; /* Stay in place */
        z-index: 99999; /* Sit on top */
        padding-top: 40px; /* Location of the box */
        left: 0;
        top: 0;
        width: 100%; /* Full width */
        height: 100%; /* Full height */
        overflow: auto; /* Enable scroll if needed */
        background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
    }

    #imageModal .modal-content {
        margin: auto;
        display: block;
        max-width: 90%;
        max-height: 80vh;
        object-fit: contain;
    }

    #imageModal #caption {
        margin: auto;
        display: block;
        width: 80%;
        max-width: 700px;
        text-align: center;
        color: #ccc;
        padding: 10px 0;
        height: 150px;
        font-size: 18px;
    }

    #imageModal .close {
        position: absolute;
        top: 15px;
        right: 35px;
        color: #f1f1f1;
        font-size: 40px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
        z-index: 100000; /* Force to be above image */
        text-shadow: 0px 0px 8px rgba(0,0,0,0.8); /* Ensures visibility over white images */
    }

    #imageModal .close:hover,
    #imageModal .close:focus {
        color: #bbb;
        text-decoration: none;
        cursor: pointer;
    }

    @media only screen and (max-width: 700px){
        #imageModal .modal-content {
            width: 100%;
        }
    }
</style>
<script>
    // Handle inline onclick calls from existing elements
    window.openImageModal = function(imgElement) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("img01");
        const captionText = document.getElementById("caption");
        
        modal.style.display = "block";
        modalImg.src = imgElement.src;
        captionText.innerHTML = imgElement.alt || "";
    }

    // Global listener for ANY image clicked that isn't handled already
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'IMG' && 
            !e.target.closest('#imageModal') && 
            !e.target.hasAttribute('onclick')) {
            openImageModal(e.target);
        }
    });

    // Close modal logic
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById("imageModal");
        const span = document.getElementById("imageModalClose");
        
        if (span) {
            span.onclick = function() {
                modal.style.display = "none";
            }
        }
        
        // Close modal when clicking outside the image
        modal.onclick = function(e) {
            if (e.target !== document.getElementById("img01")) {
                modal.style.display = "none";
            }
        }
    });
</script>
